name: publish-ghcr

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v4.0.0

      - uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6.1.0
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          annotations: |
            org.opencontainers.image.authors="ForgeFlow maintainers"

      - uses: docker/metadata-action@v6.1.0
        id: meta_rootless
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-rootless,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          annotations: |
            org.opencontainers.image.authors="ForgeFlow maintainers"

      - name: Build and publish container image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-rootful
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-rootful,mode=max

      - name: Build and publish rootless container image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.rootless
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta_rootless.outputs.tags }}
          annotations: ${{ steps.meta_rootless.outputs.annotations }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-rootless
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-rootless,mode=max
