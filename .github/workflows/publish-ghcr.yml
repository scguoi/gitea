name: publish-ghcr

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Prepare image tags
        id: image
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::12}"

          regular_tags="-t ${image}:sha-${short_sha}"
          rootless_tags="-t ${image}:sha-${short_sha}-rootless"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            branch="${GITHUB_REF_NAME//\//-}"
            regular_tags="${regular_tags} -t ${image}:${branch}"
            rootless_tags="${rootless_tags} -t ${image}:${branch}-rootless"

            if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
              regular_tags="${regular_tags} -t ${image}:latest"
              rootless_tags="${rootless_tags} -t ${image}:latest-rootless"
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            regular_tags="${regular_tags} -t ${image}:${tag} -t ${image}:${version}"
            rootless_tags="${rootless_tags} -t ${image}:${tag}-rootless -t ${image}:${version}-rootless"

            if [[ "${version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              regular_tags="${regular_tags} -t ${image}:${major}.${minor}"
              rootless_tags="${rootless_tags} -t ${image}:${major}.${minor}-rootless"
            fi
          fi

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "regular_tags=${regular_tags}" >> "$GITHUB_OUTPUT"
          echo "rootless_tags=${rootless_tags}" >> "$GITHUB_OUTPUT"

      - name: Set up buildx
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install arm64
          docker buildx create --name forgeflow-builder --use
          docker buildx inspect --bootstrap

      - name: Build and publish container image
        run: |
          docker buildx build \
            --platform "${PLATFORMS}" \
            --push \
            ${{ steps.image.outputs.regular_tags }} \
            --cache-from "type=registry,ref=${{ steps.image.outputs.image }}:buildcache-rootful" \
            --cache-to "type=registry,ref=${{ steps.image.outputs.image }}:buildcache-rootful,mode=max" \
            .

      - name: Build and publish rootless container image
        run: |
          docker buildx build \
            --file Dockerfile.rootless \
            --platform "${PLATFORMS}" \
            --push \
            ${{ steps.image.outputs.rootless_tags }} \
            --cache-from "type=registry,ref=${{ steps.image.outputs.image }}:buildcache-rootless" \
            --cache-to "type=registry,ref=${{ steps.image.outputs.image }}:buildcache-rootless,mode=max" \
            .
